<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТќЄтГЌУфътйЎ RPG Рђћ ТЅЊТђфжЂіТѕ▓</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Noto Serif JP',serif;background:#c2b29a;color:#1a1410;
  display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(0,0,0,.12) 0%,transparent 70%),
    radial-gradient(ellipse at 80% 50%,rgba(0,0,0,.10) 0%,transparent 70%),
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.08'/%3E%3C/svg%3E");
}
#app{
  width:100%;max-width:580px;height:100dvh;
  display:flex;flex-direction:column;
  padding:10px 10px 14px;position:relative;overflow:hidden;
}

/* ===== жаѓжЃежЌютЇАУ│ЄУеі ===== */
#stage-bar{
  text-align:center;font-size:.8rem;color:#5a3e28;
  padding:4px 0 6px;border-bottom:2px solid #3a2f24;
  margin-bottom:6px;letter-spacing:.08em;flex-shrink:0;
}

/* ===== УДњУЅ▓т░Їт│ЎтЇђ ===== */
#battle-area{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:8px 4px;flex-shrink:0;
}
.combatant{
  display:flex;flex-direction:column;align-items:center;width:45%;
}
/* УДњУЅ▓тюќуц║ */
.avatar{
  width:clamp(60px,18vw,90px);height:clamp(72px,22vw,108px);
  border:2.5px solid #3a2f24;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(1.8rem,6vw,2.8rem);
  background:linear-gradient(145deg,#e8dcc8,#d4c4a8);
  box-shadow:2px 3px 6px rgba(0,0,0,.25);
  position:relative;margin-bottom:6px;
  transition:opacity .1s;
}
.avatar::after{
  content:'';position:absolute;inset:3px;
  border:1px solid rgba(58,47,36,.15);border-radius:4px;
}
.combatant-name{
  font-size:clamp(.7rem,2.2vw,.82rem);font-weight:700;
  color:#3a2f24;margin-bottom:3px;text-align:center;
}
/* HP ТбЮ */
.hp-bar-bg{
  width:100%;height:14px;background:#2a1e14;
  border-radius:7px;overflow:hidden;border:1.5px solid #3a2f24;
}
.hp-bar-fill{
  height:100%;border-radius:7px;transition:width .4s ease-out;
}
.hp-player .hp-bar-fill{background:linear-gradient(90deg,#4a8c3f,#6db35a)}
.hp-enemy .hp-bar-fill{background:linear-gradient(90deg,#8b3a3a,#c04040)}
.hp-text{font-size:.7rem;color:#5a3e28;margin-top:2px}

/* жќЃтІЋтІЋуЋФ */
@keyframes flash{
  0%,100%{opacity:1}
  25%{opacity:.1}
  50%{opacity:.8}
  75%{opacity:.2}
}
.flash{animation:flash .4s ease-in-out}

/* ===== жАїуЏ« ===== */
#question-text{
  text-align:center;padding:10px 6px;
  font-size:clamp(.88rem,3vw,1.05rem);line-height:1.8;
  font-weight:700;color:#2a1e14;flex-shrink:0;
}

/* ===== жЂИжаЁ ===== */
#options{
  flex:1 1 auto;display:flex;flex-direction:column;
  justify-content:center;gap:10px;
  max-width:480px;width:100%;margin:0 auto;padding:4px 0;
}
.opt-btn{
  width:100%;padding:12px 16px;
  font-family:'Noto Serif JP',serif;
  font-size:clamp(.85rem,2.8vw,1rem);font-weight:700;
  text-align:left;line-height:1.6;
  background:linear-gradient(145deg,#e8dcc8,#d4c4a8);
  border:2px solid #3a2f24;border-radius:6px;
  box-shadow:2px 3px 6px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.2);
  cursor:pointer;user-select:none;color:#1a1410;
  transition:transform .12s,box-shadow .12s,opacity .35s,border-color .3s;
  position:relative;
}
.opt-btn::before{
  content:'';position:absolute;inset:3px;
  border:1px solid rgba(58,47,36,.12);border-radius:4px;pointer-events:none;
}
.opt-btn:hover:not(.disabled):not(.correct){transform:translateY(-2px);box-shadow:2px 5px 10px rgba(0,0,0,.28)}
.opt-btn:active:not(.disabled):not(.correct){transform:translateY(1px) scale(.98)}
.opt-btn.disabled{opacity:.35;pointer-events:none;text-decoration:line-through;text-decoration-color:rgba(0,0,0,.3)}
.opt-btn.correct{color:#8b0000!important;border-color:#8b0000!important;background:rgba(139,0,0,.06)!important;pointer-events:none;font-weight:900}
.opt-btn.correct::after{content:'Рюћ ТГБУДБ';margin-left:10px;font-size:.85em;color:#8b0000}
.opt-btn.wrong-picked{border-color:#666!important;opacity:.5;pointer-events:none}

/* ===== СИІСИђжАїТїЅжѕЋ ===== */
#next-btn{
  display:none;margin:10px auto 0;padding:10px 28px;
  font-family:'Noto Serif JP',serif;font-size:clamp(.88rem,2.6vw,1rem);font-weight:700;
  background:linear-gradient(145deg,#5a3e28,#3a2818);
  color:#d2b48c;border:2px solid #8b7355;border-radius:6px;
  cursor:pointer;transition:transform .15s,opacity .4s;opacity:0;flex-shrink:0;
}
#next-btn.show{display:inline-block;opacity:1}
#next-btn:hover{transform:scale(1.05)}
#next-btn:active{transform:scale(.97)}

/* ===== Modal№╝ѕжЂЊтЁиуЇјтІх№╝Ѕ ===== */
.modal-overlay{
  display:none;position:absolute;inset:0;z-index:150;
  background:rgba(20,14,8,.85);
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal-box{
  background:linear-gradient(145deg,#d4c4a8,#c2b29a);
  border:3px solid #3a2f24;border-radius:10px;
  padding:28px 24px;text-align:center;max-width:340px;width:90%;
  box-shadow:4px 6px 20px rgba(0,0,0,.5);
}
.modal-box h3{font-size:1.1rem;margin-bottom:10px;color:#3a2f24}
.modal-box .item-name{font-size:1.3rem;font-weight:900;color:#8b0000;margin:12px 0}
.modal-box .item-desc{font-size:.9rem;color:#5a3e28;margin-bottom:16px}
.modal-box button{
  padding:10px 30px;font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:700;
  background:linear-gradient(145deg,#5a3e28,#3a2818);
  color:#d2b48c;border:2px solid #8b7355;border-radius:6px;cursor:pointer;
}
.modal-box button:hover{transform:scale(1.05)}

/* ===== ухљу«Ќ ===== */
#result-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  position:absolute;inset:0;background:rgba(30,22,14,.92);
  z-index:100;color:#d2b48c;text-align:center;padding:20px;
}
#result-screen h2{font-size:clamp(1.5rem,5vw,2rem);margin-bottom:12px;letter-spacing:.1em}
#result-screen .big{font-size:clamp(2.2rem,8vw,3.5rem);font-weight:900;color:#cd853f;margin:10px 0}
#result-screen p{font-size:.95rem;margin:4px 0;color:#b8a080}
#result-screen button{
  margin-top:20px;padding:14px 36px;font-size:1.05rem;
  font-family:'Noto Serif JP',serif;font-weight:700;
  background:linear-gradient(145deg,#5a3e28,#3a2818);
  color:#d2b48c;border:2px solid #8b7355;border-radius:6px;cursor:pointer;
}
#result-screen button:hover{transform:scale(1.05)}

/* ===== Loading ===== */
#loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#c2b29a;z-index:200;font-size:1.1rem;color:#3a2f24;
}
.spinner{width:40px;height:40px;border:3px solid #5a3e28;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Shake */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  10%{transform:translateX(-8px) rotate(-1deg)}20%{transform:translateX(8px) rotate(1deg)}
  30%{transform:translateX(-10px) rotate(-1.5deg)}40%{transform:translateX(10px) rotate(1.5deg)}
  50%{transform:translateX(-8px) rotate(-1deg)}60%{transform:translateX(8px) rotate(1deg)}
  70%{transform:translateX(-5px)}80%{transform:translateX(5px)}90%{transform:translateX(-2px)}
}
.shake{animation:shake .55s ease-in-out}

@media(min-width:600px){#app{padding:16px 20px}#options{gap:12px}}
</style>
</head>
<body>
<div id="app">
  <div id="loading"><div class="spinner"></div><span>жАїт║ФУ╝ЅтЁЦСИГРђд</span></div>

  <div id="stage-bar">уггСИђжЌю№╝џУфътйЎсЂФУ▓асЂЉсѓІт╣йжюі</div>

  <!-- УДњУЅ▓т░Їт│Ў -->
  <div id="battle-area">
    <div class="combatant">
      <div class="avatar" id="player-avatar">­ЪДЉРђЇ­ЪјЊ</div>
      <div class="combatant-name">сЂѓсЂфсЂЪ</div>
      <div class="hp-bar-bg hp-player"><div class="hp-bar-fill" id="player-hp-bar" style="width:100%"></div></div>
      <div class="hp-text" id="player-hp-text">HP: 100 / 100</div>
    </div>
    <div style="font-size:1.5rem;color:#3a2f24;align-self:center">Рџћ</div>
    <div class="combatant">
      <div class="avatar" id="enemy-avatar">­ЪЉ╗</div>
      <div class="combatant-name" id="enemy-name">УфътйЎсЂФУ▓асЂЉсѓІт╣йжюі</div>
      <div class="hp-bar-bg hp-enemy"><div class="hp-bar-fill" id="enemy-hp-bar" style="width:100%"></div></div>
      <div class="hp-text" id="enemy-hp-text">HP: 100 / 100</div>
    </div>
  </div>

  <div id="question-text"></div>
  <div id="options"></div>
  <button id="next-btn">ТгАсЂ«тЋЈжАї РќХ</button>

  <!-- жЂЊтЁи Modal -->
  <div class="modal-overlay" id="item-modal">
    <div class="modal-box">
      <h3>­ЪјЂ жЂЊтЁисѓњТЅІсЂФтЁЦсѓїсЂЪ№╝Ђ</h3>
      <div class="item-name" id="item-name"></div>
      <div class="item-desc" id="item-desc"></div>
      <button onclick="applyItem()">OK</button>
    </div>
  </div>

  <!-- ухљу«Ќ -->
  <div id="result-screen">
    <h2 id="result-title"></h2>
    <div class="big" id="result-big"></div>
    <p id="result-detail"></p>
    <p id="result-hp"></p>
    <button onclick="initGame()">жЄЇТќ░ТїЉТѕ░</button>
  </div>
</div>

<script>
/* =========================================================
   ТќЄтГЌУфътйЎ RPG Рђћ Rusty Lake жбеТа╝ТЅЊТђфжЂіТѕ▓
   ========================================================= */

const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8GBbSsK-Orzi5eQtOPH7h0PyjUvEjJHJqFTSqnIhreL2InULl97dnQopU2okJxfneQvlLlCFPDhD7/pub?output=csv';
const PROXIES=[
  u=>'https://corsproxy.io/?'+encodeURIComponent(u),
  u=>'https://api.allorigins.win/get?url='+encodeURIComponent(u),
  u=>u
];

// жЌютЇАУеГт«џ
const STAGES=[
  {name:'УфътйЎсЂФУ▓асЂЉсѓІт╣йжюі',color:'#d0ccc6',emoji:'­ЪЉ╗'},
  {name:'ТќЄТ│ЋсЂФУ▓асЂЉсѓІт╣йжюі',color:'#5a8faf',emoji:'­ЪЉ╗'},
  {name:'СИдсЂ│ТЏ┐сЂѕсЂФУ▓асЂЉсѓІт╣йжюі',color:'#c4a84d',emoji:'­ЪЉ╗'},
  {name:'тЏЏтГЌуєЪУфътц▒ТЋЌсЂФУ▓асЂЉсѓІт╣йжюі',color:'#a83232',emoji:'­ЪЉ╗'},
];

// жЂЊтЁи
const ITEMS=[
  {name:'тЏътЙЕУќг',desc:'HPсѓњ20%тЏътЙЕсЂЎсѓІ',pct:.2},
  {name:'сЃЮсЃ╝сѓисЃДсЃ│',desc:'HPсѓњ50%тЏътЙЕсЂЎсѓІ',pct:.5},
  {name:'сЃЋсѓДсЃІсЃЃсѓ»сѓ╣сЂ«т░Й',desc:'HPсѓњ100%тЏътЙЕсЂЎсѓІ',pct:1},
];

let allQ=[],shuffledQ=[],qIdx=0;
let stageIdx=0, playerHP=100, enemyHP=100, totalCorrect=0;
let answered=false, pendingItem=null;

// DOM
const $loading=document.getElementById('loading');
const $stageBar=document.getElementById('stage-bar');
const $pAvatar=document.getElementById('player-avatar');
const $eAvatar=document.getElementById('enemy-avatar');
const $eName=document.getElementById('enemy-name');
const $pBar=document.getElementById('player-hp-bar');
const $eBar=document.getElementById('enemy-hp-bar');
const $pHPtxt=document.getElementById('player-hp-text');
const $eHPtxt=document.getElementById('enemy-hp-text');
const $qText=document.getElementById('question-text');
const $opts=document.getElementById('options');
const $nextBtn=document.getElementById('next-btn');
const $itemModal=document.getElementById('item-modal');
const $result=document.getElementById('result-screen');

// Audio
const AC=window.AudioContext||window.webkitAudioContext;
let ac;
function ensureAC(){if(!ac)ac=new AC()}
function playHit(){
  ensureAC();const o=ac.createOscillator(),g=ac.createGain();
  o.type='sine';o.frequency.value=1200;
  g.gain.setValueAtTime(.3,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.2);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.2);
}
function playHurt(){
  ensureAC();const o=ac.createOscillator(),g=ac.createGain();
  o.type='square';o.frequency.value=180;
  g.gain.setValueAtTime(.25,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.3);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.3);
}

// CSV
async function loadCSV(){
  let err;
  for(const mk of PROXIES){
    try{
      const url=mk(CSV_URL);const r=await fetch(url);
      if(!r.ok)throw new Error('HTTP '+r.status);
      let t=await r.text();
      if(url.includes('allorigins.win/get'))t=JSON.parse(t).contents;
      allQ=parseCSV(t);
      if(!allQ.length)throw new Error('уЕ║');
      $loading.style.display='none';
      initGame();return;
    }catch(e){err=e}
  }
  $loading.innerHTML='<p style="color:#8b0000">Рџа жАїт║ФУ╝ЅтЁЦтц▒ТЋЌ<br><small>'+err.message+'</small></p>';
}
function parseCSV(t){
  const ls=t.split(/\r?\n/).filter(l=>l.trim());if(ls.length<2)return[];
  const h=splitC(ls[0]),d=[];
  for(let i=1;i<ls.length;i++){
    const c=splitC(ls[i]);if(c.length<h.length)continue;
    const o={};h.forEach((k,j)=>o[k.trim()]=(c[j]||'').trim());
    if(o.question&&o.A)d.push(o);
  }return d;
}
function splitC(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    const ch=l[i];
    if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++;}else if(ch==='"')q=false;else c+=ch;}
    else{if(ch==='"')q=true;else if(ch===','){r.push(c);c='';}else c+=ch;}
  }r.push(c);return r;
}

// ===== жЂіТѕ▓тѕЮтДІтїќ =====
function initGame(){
  $result.style.display='none';
  stageIdx=0;playerHP=100;totalCorrect=0;qIdx=0;
  shuffledQ=[...allQ].sort(()=>Math.random()-.5);
  // жЄЇТќ░ТїЉТѕ░ТЎѓуЏ┤ТјЦТЂбтЙЕ 100% УАђжЄЈ№╝їУи│жЂјжЂЊтЁиуЏ┤ТјЦжќІтДІуггСИђжЌю
  startStage();
}

// ===== жЂЊтЁи Modal =====
function showItemModal(){
  pendingItem=ITEMS[Math.floor(Math.random()*ITEMS.length)];
  document.getElementById('item-name').textContent=pendingItem.name;
  document.getElementById('item-desc').textContent=pendingItem.desc;
  $itemModal.classList.add('show');
}
function applyItem(){
  playerHP=Math.min(100,Math.round(playerHP+100*pendingItem.pct));
  updateHP();
  $itemModal.classList.remove('show');
  pendingItem=null;
  startStage();
}

// ===== жЌютЇАжќІтДІ =====
function startStage(){
  const s=STAGES[stageIdx];
  enemyHP=100;
  $stageBar.textContent=`угг${['СИђ','С║ї','СИЅ','тЏЏ'][stageIdx]}жЌю№╝џ${s.name}`;
  $eName.textContent=s.name;
  $eAvatar.style.background=`linear-gradient(145deg,${s.color},${adjustColor(s.color,-.15)})`;
  updateHP();
  nextQuestion();
}

function adjustColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,Math.round(r*(1+amt))));
  g=Math.max(0,Math.min(255,Math.round(g*(1+amt))));
  b=Math.max(0,Math.min(255,Math.round(b*(1+amt))));
  return `rgb(${r},${g},${b})`;
}

function updateHP(){
  $pBar.style.width=Math.max(0,playerHP)+'%';
  $eBar.style.width=Math.max(0,enemyHP)+'%';
  $pHPtxt.textContent=`HP: ${Math.max(0,playerHP)} / 100`;
  $eHPtxt.textContent=`HP: ${Math.max(0,enemyHP)} / 100`;
}

// ===== тЄ║жАї =====
function nextQuestion(){
  answered=false;
  $nextBtn.classList.remove('show');
  if(qIdx>=shuffledQ.length){
    shuffledQ=[...allQ].sort(()=>Math.random()-.5);qIdx=0;
  }
  const q=shuffledQ[qIdx++];
  $qText.textContent=q.question;
  const correct=q.A;
  const choices=[q.A,q.B,q.C,q.D].filter(Boolean).sort(()=>Math.random()-.5);
  $opts.innerHTML='';
  choices.forEach(txt=>{
    const b=document.createElement('button');
    b.className='opt-btn';b.textContent=txt;
    b.addEventListener('click',()=>onPick(b,txt,correct));
    $opts.appendChild(b);
  });
}

// ===== жЂИТЊЄтѕцт«џ =====
function onPick(btn,picked,correct){
  if(answered)return;
  const dmg=Math.floor(Math.random()*11)+15; // 15~25

  if(picked===correct){
    // ТГБуб║ Рєњ Тћ╗ТЊіжг╝жГѓ
    playHit();answered=true;totalCorrect++;
    btn.classList.add('correct');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b!==btn)b.style.pointerEvents='none'});
    enemyHP=Math.max(0,enemyHP-dmg);
    updateHP();
    flashEl($eAvatar);

    if(enemyHP<=0){
      // жг╝жГѓтђњСИІ
      $nextBtn.textContent=stageIdx<STAGES.length-1?'ТгАсЂ«сѓ╣сЃєсЃ╝сѓИ РќХ':'ухљТъюсѓњУдІсѓІ РќХ';
      $nextBtn.onclick=()=>{
        stageIdx++;
        if(stageIdx>=STAGES.length){showResult(true);return;}
        showItemModal();
      };
    } else {
      $nextBtn.textContent='ТгАсЂ«тЋЈжАї РќХ';
      $nextBtn.onclick=()=>nextQuestion();
    }
    $nextBtn.classList.add('show');
  } else {
    // жї»Уфц Рєњ тГИућЪУбФТћ╗ТЊі
    playHurt();
    btn.classList.add('wrong-picked');
    playerHP=Math.max(0,playerHP-dmg);
    updateHP();
    flashEl($pAvatar);
    // жА»уц║ТГБуб║уГћТАѕ
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent===correct)b.classList.add('correct');
      b.style.pointerEvents='none';
    });
    answered=true;

    if(playerHP<=0){
      setTimeout(()=>showResult(false),600);
      return;
    }
    $nextBtn.textContent='ТгАсЂ«тЋЈжАї РќХ';
    $nextBtn.onclick=()=>nextQuestion();
    $nextBtn.classList.add('show');
  }
}

function flashEl(el){
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),450);
}

function showResult(won){
